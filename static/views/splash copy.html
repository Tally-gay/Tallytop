        }

        .media {
            max-width: 256px;
            max-height: 164px;
            height: auto;
            width: auto;
            image-rendering: pixelated;
            border-radius: 1em;
        }

        #q {
            font-size: 0.8rem;
            position: absolute;
            bottom: 0.5em;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 2em);
            color: var(--fg-semi-trans);
        }
    </style>
</head>
