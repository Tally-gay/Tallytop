name: Release

on:
    push:
        tags:
            - v*
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        runs-on: ${{ matrix.os }}

        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest]
                include:
                    - os: ubuntu-latest
                      platform: linux
                    - os: windows-latest
                      platform: windows

        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2

            - name: Install system dependencies
              if: ${{ matrix.platform == 'linux' }}
              run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev

            - name: Install dependencies
              run: bun install

            - name: Build
              run: bun run build

            - name: Run Electron Builder
              run: bun run electron-builder --${{ matrix.platform }}

            - name: Upload dist artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: dist-${{ matrix.platform }}
                  path: dist/**

    release:
        needs: build
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Download release artifacts
              uses: actions/download-artifact@v4
              with:
                  path: release-assets

            - name: Validate tag and package version
              id: version_check
              run: |
                  CURRENT=$(jq -r .version package.json)
                  TAG_NAME="${GITHUB_REF#refs/tags/}"
                  if [ -z "$TAG_NAME" ]; then
                    echo "GITHUB_REF is not a tag ref: $GITHUB_REF"
                    exit 1
                  fi
                  if [ "$TAG_NAME" != "v$CURRENT" ]; then
                    echo "Tag $TAG_NAME does not match package version v$CURRENT"
                    exit 1
                  fi
                  echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
                  echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Create release if not exists
              shell: bash
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG_NAME="${{ steps.version_check.outputs.tag_name }}"
                  if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
                    gh release create "$TAG_NAME" \
                      --title "$TAG_NAME" \
                      --generate-notes \
                      --latest
                  fi

            - name: Upload artifacts to GitHub Release
              shell: bash
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG_NAME="${{ steps.version_check.outputs.tag_name }}"
                  find release-assets -type f | while IFS= read -r file; do
                    echo "Uploading $file..."
                    gh release upload "$TAG_NAME" "$file" --clobber
                  done
