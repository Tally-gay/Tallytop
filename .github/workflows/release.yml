name: Release

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write

env:
    FORCE_COLOR: true
    GH_TOKEN: ${{ github.token }}

jobs:
    version:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.get.outputs.version }}
            tag: ${{ steps.get.outputs.tag }}
            exists: ${{ steps.check.outputs.exists }}

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Get version
              id: get
              run: |
                  VERSION=$(jq -r .version package.json)
                  TAG="v$VERSION"
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "tag=$TAG" >> "$GITHUB_OUTPUT"

            - name: Check if tag exists
              id: check
              run: |
                  if git show-ref --tags --verify --quiet "refs/tags/${{ steps.get.outputs.tag }}"; then
                    echo "exists=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "exists=false" >> "$GITHUB_OUTPUT"
                  fi
    create-tag:
        needs: version
        if: ${{ needs.version.outputs.exists == 'false' }}
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Create and push tag
              run: |
                  TAG="${{ needs.version.outputs.tag }}"
                  git config user.name "github-actions"
                  git config user.email "github-actions@github.com"

                  git tag "$TAG"
                  git push origin "$TAG"

    build:
        needs: [version, create-tag]
        runs-on: ${{ matrix.os }}
        if: ${{ needs.version.outputs.exists == 'false' }}

        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest]
                include:
                    - os: ubuntu-latest
                      platform: linux
                    - os: windows-latest
                      platform: windows

        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2

            - name: Install system dependencies
              if: ${{ matrix.platform == 'linux' }}
              run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev

            - name: Install dependencies
              run: bun install

            - name: Build
              run: bun run build

            - name: Run Electron Builder
              run: bun run electron-builder --${{ matrix.platform }}

            - name: Upload dist artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: dist-${{ matrix.platform }}
                  path: dist/**

    release:
        needs: [build, version]
        if: ${{ needs.version.outputs.exists == 'false' }}
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Create release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release create "${{ needs.version.outputs.tag }}" \
                    --generate-notes \
                    --latest
