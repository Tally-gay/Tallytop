name: Release

on:
    push:
        tags:
            - v*
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write

env:
    FORCE_COLOR: true
    GH_TOKEN: ${{ github.token }}

jobs:
    precheck:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.version_check.outputs.version }}
            tag_name: ${{ steps.version_check.outputs.tag_name }}

        steps:
            - uses: actions/checkout@v4

            - name: Validate tag and package version
              id: version_check
              run: |
                  CURRENT=$(jq -r .version package.json)
                  TAG_NAME="${GITHUB_REF#refs/tags/}"
                  TAG_VERSION="${TAG_NAME#v}"

                  if [ -z "$TAG_NAME" ]; then
                    echo "Not a tag ref"
                    exit 1
                  fi

                  if [ "$TAG_VERSION" != "$CURRENT" ]; then
                    echo "Tag version $TAG_VERSION does not match package.json version $CURRENT"
                    echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
                    echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
                    exit 1
                  fi

                  echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
                  echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

    build:
        needs: precheck
        runs-on: ${{ matrix.os }}

        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest]
                include:
                    - os: ubuntu-latest
                      platform: linux
                    - os: windows-latest
                      platform: windows

        steps:
            - uses: actions/checkout@v4
            - uses: oven-sh/setup-bun@v2

            - name: Install system dependencies
              if: ${{ matrix.platform == 'linux' }}
              run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev

            - name: Install dependencies
              run: bun install

            - name: Build
              run: bun run build

            - name: Run Electron Builder
              run: bun run electron-builder --${{ matrix.platform }}

            - name: Upload dist artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: dist-${{ matrix.platform }}
                  path: dist/**

    fix-version:
        needs: precheck
        if: ${{ needs.precheck.result == 'failure' }}
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Extract tag version
              id: tag
              run: |
                  TAG_NAME="${GITHUB_REF#refs/tags/}"
                  VERSION="${TAG_NAME#v}"
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"

            - name: Update package.json version
              run: |
                  jq ".version = \"${{ steps.tag.outputs.version }}\"" package.json > tmp.json
                  mv tmp.json package.json

            - name: Create PR
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  BRANCH="fix/version-${{ steps.tag.outputs.version }}"
                  git config user.name "github-actions"
                  git config user.email "github-actions@github.com"

                  git checkout -b "$BRANCH"
                  git commit -am "fix: match version to tag v${{ steps.tag.outputs.version }}"
                  git push origin "$BRANCH"

                  gh pr create \
                    --title "Fix version mismatch (v${{ steps.tag.outputs.version }})" \
                    --body "fix: package.json version updated to match tag." \
                    --base main \
                    --head "$BRANCH"

    release:
        needs: build
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Download release artifacts
              uses: actions/download-artifact@v4
              with:
                  path: release-assets

            - name: Create release if not exists
              shell: bash
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG_NAME="${GITHUB_REF#refs/tags/}"

                  if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
                    gh release create "$TAG_NAME" \
                      --title "$TAG_NAME" \
                      --generate-notes \
                      --latest
                  fi

            - name: Upload artifacts to GitHub Release
              shell: bash
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG_NAME="${GITHUB_REF#refs/tags/}"

                  find release-assets -type f | while IFS= read -r file; do
                    echo "Uploading $file..."
                    gh release upload "$TAG_NAME" "$file" --clobber
                  done
